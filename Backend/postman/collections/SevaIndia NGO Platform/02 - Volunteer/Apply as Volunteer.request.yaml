$kind: http-request
url: "{{base_url}}/api/volunteer/apply"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{user_token}}
body:
  type: json
  content: >-
    {
      "name": "John Doe",
      "phone": "9876543210",
      "city": "Mumbai",
      "skills": ["teaching", "first-aid"],
      "availability": "weekends",
      "motivation": "I want to contribute to society and help underprivileged communities."
    }
order: 2000
