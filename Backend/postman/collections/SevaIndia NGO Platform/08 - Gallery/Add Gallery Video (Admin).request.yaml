$kind: http-request
url: "{{base_url}}/api/gallery/admin/video"
method: POST
headers:
  Authorization: Bearer {{admin_token}}
body:
  type: formdata
  content:
    - type: file
      key: thumbnail
      src:
        - ""
    - type: text
      key: title
      value: Impact Story - Education Program
    - type: text
      key: description
      value: A short film showcasing the impact of our education program.
    - type: text
      key: videoUrl
      value: https://www.youtube.com/watch?v=example123
    - type: text
      key: category
      value: Education
    - type: text
      key: tags
      value: education, impact, children
order: 7000
