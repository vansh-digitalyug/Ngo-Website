$kind: http-request
url: "{{base_url}}/api/blogs/create-blog"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{admin_token}}
body:
  type: json
  content: >-
    {
      "title": "How Your Donation Helped 500 Children Get Education",
      "content": "<p>Thanks to the generous support of our donors, we were able to provide education kits, school uniforms, and tuition support to 500 underprivileged children this year...</p>",
      "coverImage": "blogs/education-impact.jpg",
      "tags": ["education", "impact", "children", "donation"],
      "summary": "A heartwarming story of how donor contributions transformed the lives of 500 children."
    }
order: 3000
