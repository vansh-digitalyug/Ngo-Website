$kind: http-request
url: "{{base_url}}/api/payment/webhook"
method: POST
headers:
  x-razorpay-signature: webhook_signature_here
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "event": "payment.captured",
      "payload": {
        "payment": {
          "entity": {
            "id": "pay_XxXxXxXx",
            "order_id": "order_XxXxXxXx",
            "amount": 50000,
            "currency": "INR",
            "status": "captured"
          }
        }
      }
    }
order: 3000
