$kind: http-request
url: "{{base_url}}/api/payment/order"
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: Bearer {{user_token}}
    disabled: true
body:
  type: json
  content: |-
    {
      "amount": 500,
      "currency": "INR",
      "ngoId": "NGO_MONGO_ID_HERE",
      "donorName": "Rahul Verma",
      "donorEmail": "rahul.verma@example.com",
      "donorPhone": "9876543210",
      "message": "Supporting education for children."
    }
order: 1000
