$kind: http-request
url: "{{base_url}}/api/profile"
method: PUT
headers:
  Authorization: Bearer {{user_token}}
body:
  type: formdata
  content:
    - type: text
      key: name
      value: John Updated
    - type: text
      key: phone
      value: "9876543210"
    - type: file
      key: avatar
      src:
        - ""
order: 9000
